name: soilmate
description: "SoilMate — Soil Nutrient Analyzer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  sqflite: ^2.2.8
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  file: ^7.0.1
  matcher: ^0.12.18
  camera: ^0.12.0+1
  image: ^4.1.3
  path_provider: ^2.1.2
  syncfusion_flutter_charts: ^33.2.4
  flutter_colorpicker: ^1.0.3
  fl_chart: ^1.2.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  path: any
  flutter_native_splash: ^2.3.9

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1
  fluttertoast: ^9.0.0
  flutter_secure_storage: ^10.0.0
  http: ^1.2.1
  shared_preferences: ^2.3.0
  connectivity_plus: ^7.1.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4A6741"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#F5F0E8"
  image: assets/images/app_icon.png
  color_dark: "#1C1710"
  image_dark: assets/images/app_icon.png
  android_12:
    color: "#F5F0E8"
    image: assets/images/app_icon.png
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/google_logo.png