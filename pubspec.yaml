name: soilmate
description: "SoilMate — Soil Nutrient Analyzer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  sqflite: ^2.2.8
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  file: ^7.0.1
  matcher: ^0.12.18
  camera: ^0.10.5
  image: ^4.1.3
  path_provider: ^2.1.2
  syncfusion_flutter_charts: ^25.1.35
  flutter_colorpicker: ^1.0.3
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  path: any
  flutter_native_splash: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4A6741"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#F5F0E8"
  image: assets/images/app_icon.png
  color_dark: "#1C1710"
  image_dark: assets/images/app_icon.png
  android_12:
    color: "#F5F0E8"
    image: assets/images/app_icon.png
  fullscreen: true

flutter:
  uses-material-design: true